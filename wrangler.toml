# Cloudflare Pages 部署配置
name = "image-bg-remover"
compatibility_date = "2025-03-14"

# 构建配置
[build]
command = "npm install && npm run build"
directory = "dist"

# 环境变量
[vars]
NODE_VERSION = "20"

# 密文环境变量（在 Cloudflare Dashboard 中设置）
# [[env.production.vars]]
# REMOVE_BG_API_KEY = ""

# 路由规则
[[redirects]]
from = "/api/*"
to = "/api/:splat"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
